name: Deploy Homelab

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate n8n compose
        uses: docker compose -f n8n-automation/docker-compose.yml config

      - name: Validate netbox compose
        uses: docker compose -f netbox-config/docker-compose.yml config

deploy:
  name: Deploy to Homelab
  runs-on: [self-hosted, linux, homelab]
  needs: validate
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy n8n
      run: |
        cd /home/paris/Proyectos/n8n-automation
        docker compose up -d

    - name: Deploy netbox
      run: |
        cd /home/paris/Proyectos/netbox
        docker compose up -d
